<main class="relative pt-32 pb-16 px-4 max-w-7xl mx-auto text-center overflow-hidden">
  
  <!-- Ambient background glow -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-indigo-500/20 dark:bg-indigo-500/10 rounded-full blur-[100px] pointer-events-none -z-10"></div>
  <div class="absolute top-[20%] left-[80%] -translate-x-1/2 w-[400px] h-[400px] bg-rose-500/20 dark:bg-rose-500/10 rounded-full blur-[90px] pointer-events-none -z-10"></div>

  <!-- Main Hero Title -->
  <h1 class="text-5xl md:text-7xl font-extrabold text-slate-900 dark:text-purple-100 leading-[1.1] tracking-tight max-w-4xl mx-auto">
    Unlock your potential in<br />
    <span class="relative inline-block mt-2">
      <span class="bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 via-purple-600 to-rose-500">
        Programming
      </span>
      <span class="absolute -right-2 top-2 bottom-2 w-1 bg-rose-500 animate-pulse rounded-full"></span>
    </span>
  </h1>

  <p class="mt-8 text-lg md:text-xl text-slate-500 dark:text-slate-400 max-w-2xl mx-auto leading-relaxed">
    Join visually stunning, interactive courses to advance your career. Learn modern technologies through real-world projects.
  </p>

  <!-- Modern Search Bar with PrimeNG -->
  <div class="mt-12 max-w-2xl mx-auto relative group">
    <div class="absolute -inset-0.5 bg-gradient-to-r from-indigo-500 to-rose-500 rounded-full blur opacity-30 group-hover:opacity-60 transition duration-1000 group-hover:duration-200"></div>
    <div class="relative flex items-center p-2 bg-white dark:bg-slate-900 rounded-full shadow-2xl border border-white/20 dark:border-slate-800 focus-within:ring-4 focus-within:ring-indigo-500/20 transition-all">
      <span class="pl-6 text-slate-400">
        <i class="pi pi-search text-lg"></i>
      </span>
      <input
        pInputText
        type="text"
        placeholder="What do you want to learn today?"
        class="flex-1 bg-transparent border-none outline-none px-4 py-3 text-slate-800 dark:text-white placeholder:text-slate-400/80 font-medium p-inputtext-sm"
      />
      <p-button 
        label="Explore Courses"
        styleClass="bg-slate-900 dark:bg-white text-white dark:text-slate-900 border-none px-8 py-3.5 rounded-full font-bold text-sm tracking-wide shadow-md active:scale-95 transition-all"
        [raised]="true">
      </p-button>
    </div>
  </div>

  <!-- Student Showcase -->
  <div class="mt-28 relative min-h-[450px] flex items-end justify-center">
    <!-- Floating Subjects (PrimeNG Badges on Glassmorphism tags) -->
    <div class="absolute inset-0 z-10 pointer-events-none select-none">
      <div class="absolute left-[2%] md:left-[10%] top-[15%] animate-[bounce_5s_ease-in-out_infinite]">
        <div class="px-5 py-2.5 backdrop-blur-md bg-white/70 dark:bg-slate-800/70 border border-emerald-500/30 text-emerald-600 dark:text-emerald-400 font-bold rounded-2xl shadow-xl shadow-emerald-500/10 rotate-[-6deg]">
           Management
        </div>
      </div>

      <div class="absolute left-[25%] top-[0%] hidden md:block animate-[bounce_6s_ease-in-out_infinite_0.5s]">
         <div class="px-5 py-2.5 backdrop-blur-md bg-white/70 dark:bg-slate-800/70 border border-amber-500/30 text-amber-600 dark:text-amber-400 font-bold rounded-2xl shadow-xl shadow-amber-500/10 rotate-[4deg]">
           Spanish
        </div>
      </div>

      <div class="absolute right-[35%] top-[10%] hidden md:block animate-[bounce_7s_ease-in-out_infinite_1s]">
         <div class="px-5 py-2.5 backdrop-blur-md bg-white/70 dark:bg-slate-800/70 border border-cyan-500/30 text-cyan-600 dark:text-cyan-400 font-bold rounded-2xl shadow-xl shadow-cyan-500/10 rotate-[-3deg]">
           English
        </div>
      </div>

      <div class="absolute right-[5%] md:right-[15%] top-[20%] animate-[bounce_5.5s_ease-in-out_infinite_1.5s]">
         <div class="px-5 py-2.5 backdrop-blur-md bg-white/70 dark:bg-slate-800/70 border border-rose-500/30 text-rose-600 dark:text-rose-400 font-bold rounded-2xl shadow-xl shadow-rose-500/10 rotate-[8deg]">
           Biology
        </div>
      </div>
    </div>

    <!-- Student Images balanced gallery -->
    <div class="flex items-end justify-center w-full max-w-5xl px-4 relative z-0">
      
      <!-- Ambient floor gradient for the students to stand on -->
      <div class="absolute bottom-0 left-10 right-10 h-32 bg-gradient-to-t from-white via-white/80 dark:from-slate-950 dark:via-slate-950/80 to-transparent z-20"></div>

      <div class="relative w-1/4 max-w-[160px] translate-x-8 hover:z-30 transition-transform duration-500 hover:-translate-y-4">
        <img src="https://images.unsplash.com/photo-1544717297-fa154da09f9b?w=400" class="w-full h-[240px] md:h-[300px] object-cover rounded-t-full shadow-2xl shadow-indigo-900/20 grayscale hover:grayscale-0 transition-all duration-500 border-4 border-white dark:border-slate-800" />
      </div>
      
      <div class="relative w-1/3 max-w-[200px] translate-x-4 z-10 hover:z-30 transition-transform duration-500 hover:-translate-y-4">
        <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=400" class="w-full h-[280px] md:h-[360px] object-cover rounded-t-[100px] shadow-2xl shadow-indigo-900/20 grayscale hover:grayscale-0 transition-all duration-500 border-4 border-white dark:border-slate-800" />
      </div>

      <div class="relative w-2/5 max-w-[240px] z-20 hover:z-30 transition-transform duration-500 hover:-translate-y-4">
        <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=400" class="w-full h-[320px] md:h-[420px] object-cover rounded-t-[120px] shadow-2xl shadow-purple-900/30 grayscale-0 border-4 border-white dark:border-slate-800" />
      </div>

      <div class="relative w-1/3 max-w-[200px] -translate-x-4 z-10 hover:z-30 transition-transform duration-500 hover:-translate-y-4">
        <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=400" class="w-full h-[270px] md:h-[340px] object-cover rounded-t-[100px] shadow-2xl shadow-rose-900/20 grayscale hover:grayscale-0 transition-all duration-500 border-4 border-white dark:border-slate-800" />
      </div>

      <div class="relative w-1/4 max-w-[160px] -translate-x-8 hover:z-30 transition-transform duration-500 hover:-translate-y-4">
        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400" class="w-full h-[220px] md:h-[280px] object-cover rounded-t-full shadow-2xl shadow-rose-900/20 grayscale hover:grayscale-0 transition-all duration-500 border-4 border-white dark:border-slate-800" />
      </div>
    </div>
  </div>
</main>
