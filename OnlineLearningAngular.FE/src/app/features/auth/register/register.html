<div
  class="min-h-screen py-24 flex items-center justify-center px-4 relative overflow-hidden bg-slate-50 dark:bg-slate-950"
>
  <!-- Ambient background glow (matches Home & Login) -->
  <div
    class="absolute top-[10%] left-[20%] w-[500px] h-[500px] bg-indigo-500/20 dark:bg-indigo-500/10 rounded-full blur-[100px] pointer-events-none fixed"
  ></div>
  <div
    class="absolute bottom-[10%] right-[20%] w-[400px] h-[400px] bg-rose-500/20 dark:bg-rose-500/10 rounded-full blur-[90px] pointer-events-none fixed"
  ></div>

  <!-- Register Card (Glassmorphism) -->
  <div
    class="w-full max-w-3xl backdrop-blur-xl bg-white/70 dark:bg-slate-900/70 border border-white/50 dark:border-slate-800 shadow-2xl shadow-indigo-900/10 rounded-3xl p-8 sm:p-10 relative z-10"
  >
    <!-- Header -->
    <div class="text-center mb-10">
      <div
        class="inline-flex items-center justify-center bg-gradient-to-tr from-indigo-600 to-rose-500 p-3 rounded-xl shadow-lg shadow-rose-500/20 mb-6"
      >
        <i class="pi pi-user-plus text-3xl text-white"></i>
      </div>
      <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">
        Create
        <span class="bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-rose-500"
          >Account</span
        >
      </h2>
      <p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">
        Join us today to accelerate your programming skills.
      </p>
    </div>

    <!-- Form -->
    <form class="space-y-6">
      <!-- Grid for 2 column layout -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- FullName -->
        <div>
          <label
            for="fullName"
            class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2"
            >Full Name</label
          >
          <input
            id="fullName"
            name="fullName"
            type="text"
            pInputText
            required
            class="w-full px-4 py-3 bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-400"
            placeholder="John Doe"
          />
        </div>

        <!-- Username -->
        <div>
          <label
            for="username"
            class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2"
            >Username</label
          >
          <input
            id="username"
            name="username"
            type="text"
            pInputText
            required
            class="w-full px-4 py-3 bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-400"
            placeholder="johndoe123"
          />
        </div>

        <!-- Email -->
        <div>
          <label
            for="email"
            class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2"
            >Email Address</label
          >
          <input
            id="email"
            name="email"
            type="email"
            pInputText
            required
            autocomplete="email"
            class="w-full px-4 py-3 bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-400"
            placeholder="you@example.com"
          />
        </div>

        <!-- PhoneNumber -->
        <div>
          <label
            for="phoneNumber"
            class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2"
            >Phone Number</label
          >
          <input
            id="phoneNumber"
            name="phoneNumber"
            type="tel"
            pInputText
            required
            class="w-full px-4 py-3 bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-400"
            placeholder="+1 (555) 000-0000"
          />
        </div>

        <!-- Date of Birth (DatePicker) -->
        <div>
          <label
            for="dob"
            class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2"
            >Date of Birth</label
          >
          <p-datepicker
            id="dob"
            name="dob"
            [(ngModel)]="dob"
            [showIcon]="true"
            styleClass="w-full"
            inputStyleClass="w-full px-4 py-3 bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-400"
            placeholder="Select date"
          >
          </p-datepicker>
        </div>

        <!-- Gender (IsMale) -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2"
            >Gender</label
          >
          <div class="flex items-center gap-6 py-3">
            <div class="flex items-center">
              <p-radioButton
                name="gender"
                [value]="true"
                [(ngModel)]="isMale"
                inputId="male"
              ></p-radioButton>
              <label
                for="male"
                class="ml-2 text-sm font-medium text-slate-700 dark:text-slate-300 cursor-pointer"
                >Male</label
              >
            </div>
            <div class="flex items-center">
              <p-radioButton
                name="gender"
                [value]="false"
                [(ngModel)]="isMale"
                inputId="female"
              ></p-radioButton>
              <label
                for="female"
                class="ml-2 text-sm font-medium text-slate-700 dark:text-slate-300 cursor-pointer"
                >Female</label
              >
            </div>
          </div>
        </div>
      </div>

      <!-- Address (full width) -->
      <div>
        <label
          for="address"
          class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2"
          >Address</label
        >
        <input
          id="address"
          name="address"
          type="text"
          pInputText
          required
          class="w-full px-4 py-3 bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-400"
          placeholder="123 Main St, City, Country"
        />
      </div>

      <!-- Password (full width) -->
      <div>
        <label
          for="password"
          class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2"
          >Password</label
        >
        <p-password
          id="password"
          name="password"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full px-4 py-3 bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-400"
          placeholder="••••••••"
        >
        </p-password>
      </div>

      <div>
        <label
          for="confirmPassword"
          class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2"
          >Confirm Password</label
        >
        <p-password
          id="confirmPassword"
          name="confirmPassword"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full px-4 py-3 bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-400"
          placeholder="••••••••"
        >
        </p-password>
      </div>

      <!-- Submit Button -->
      <p-button
        type="submit"
        label="Create Account"
        styleClass="w-full flex justify-center mt-8 py-4 px-4 rounded-xl text-sm font-bold text-white bg-gradient-to-r from-indigo-600 to-rose-500 hover:from-indigo-500 hover:to-rose-400 border-none shadow-lg shadow-indigo-500/25 active:scale-[0.98] transition-all"
      >
      </p-button>

      <!-- Footer/Switch Action -->
      <div class="text-center pt-6 border-t border-slate-200 dark:border-slate-800">
        <p class="text-sm text-slate-600 dark:text-slate-400 font-medium">
          Already have an account?
          <a
            routerLink="/login"
            class="font-bold text-indigo-600 hover:text-indigo-500 dark:text-indigo-400 dark:hover:text-indigo-300 transition-colors"
            >Sign in</a
          >
        </p>
      </div>
    </form>
  </div>
</div>
