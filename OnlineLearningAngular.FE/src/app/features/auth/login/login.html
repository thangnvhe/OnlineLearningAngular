<div
  class="min-h-screen flex items-center justify-center px-4 relative overflow-hidden bg-slate-50 dark:bg-slate-950"
>
  <!-- Ambient background glow (matches Home) -->
  <div
    class="absolute top-[10%] left-[20%] w-[500px] h-[500px] bg-indigo-500/20 dark:bg-indigo-500/10 rounded-full blur-[100px] pointer-events-none"
  ></div>
  <div
    class="absolute bottom-[10%] right-[20%] w-[400px] h-[400px] bg-rose-500/20 dark:bg-rose-500/10 rounded-full blur-[90px] pointer-events-none"
  ></div>

  <!-- Login Card (Glassmorphism) -->
  <div
    class="w-full max-w-md backdrop-blur-xl bg-white/70 dark:bg-slate-900/70 border border-white/50 dark:border-slate-800 shadow-2xl shadow-indigo-900/10 rounded-3xl p-8 sm:p-10 relative z-10"
  >
    <!-- Header -->
    <div class="text-center mb-10">
      <div
        class="inline-flex items-center justify-center bg-gradient-to-tr from-indigo-600 to-rose-500 p-3 rounded-xl shadow-lg shadow-rose-500/20 mb-6"
      >
        <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path
            d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
          />
        </svg>
      </div>
      <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">
        Welcome
        <span class="bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-rose-500"
          >Back</span
        >
      </h2>
      <p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">
        Please sign in to continue your learning journey.
      </p>
    </div>

    <!-- Form -->
    <form class="space-y-6">
      <!-- Email Field -->
      <div>
        <label
          for="email"
          class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2"
          >Email Address</label
        >
        <div class="relative">
          <!-- <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none z-10">
            <i class="pi pi-at text-slate-400 text-lg"></i>
          </div> -->
          <input
            id="email"
            name="email"
            type="email"
            pInputText
            required
            autocomplete="email"
            class="w-full pl-11 pr-4 py-3 bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all placeholder:text-slate-400"
            placeholder="you@example.com"
          />
        </div>
      </div>

      <!-- Password Field -->
      <div>
        <div class="flex items-center justify-between mb-2">
          <label
            for="password"
            class="block text-sm font-semibold text-slate-700 dark:text-slate-300"
            >Password</label
          >
          <a
            routerLink="/forgot-password"
            class="text-sm font-medium text-indigo-600 hover:text-indigo-500 transition-colors"
            >Forgot password?</a
          >
        </div>
        <div class="relative">
          <p-password
            id="password"
            name="password"
            [toggleMask]="true"
            [feedback]="false"
            styleClass="w-full"
            inputStyleClass="w-full pl-11 pr-4 py-3 bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all placeholder:text-slate-400"
            placeholder="••••••••"
          >
          </p-password>
          <!-- <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none z-10">
            <i class="pi pi-lock text-slate-400 text-lg"></i>
          </div> -->
        </div>
      </div>

      <!-- Submit Button -->
      <p-button
        type="submit"
        label="Sign In"
        styleClass="w-full flex justify-center py-3.5 px-4 rounded-xl text-sm font-bold text-white bg-gradient-to-r from-indigo-600 to-rose-500 hover:from-indigo-500 hover:to-rose-400 border-none shadow-lg shadow-indigo-500/25 active:scale-[0.98] transition-all"
      >
      </p-button>

      <!-- Footer/Switch Action -->
      <div class="text-center pt-4">
        <p class="text-sm text-slate-600 dark:text-slate-400 font-medium">
          Don't have an account?
          <a
            routerLink="/register"
            class="font-bold text-indigo-600 hover:text-indigo-500 dark:text-indigo-400 dark:hover:text-indigo-300 transition-colors"
            >Sign up</a
          >
        </p>
        <p class="text-sm text-slate-600 dark:text-slate-400 font-medium mt-2">
          Didn't receive confirmation email?
          <a
            routerLink="/resend-confirm-email"
            class="font-bold text-indigo-600 hover:text-indigo-500 dark:text-indigo-400 dark:hover:text-indigo-300 transition-colors"
            >Resend now</a
          >
        </p>
      </div>
    </form>
  </div>
</div>
