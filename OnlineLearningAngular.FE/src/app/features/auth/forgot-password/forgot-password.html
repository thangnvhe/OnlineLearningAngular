<div
  class="min-h-screen flex items-center justify-center px-4 relative overflow-hidden bg-slate-50 dark:bg-slate-950"
>
  <div
    class="absolute top-[10%] left-[20%] w-[500px] h-[500px] bg-indigo-500/20 dark:bg-indigo-500/10 rounded-full blur-[100px] pointer-events-none"
  ></div>
  <div
    class="absolute bottom-[10%] right-[20%] w-[400px] h-[400px] bg-rose-500/20 dark:bg-rose-500/10 rounded-full blur-[90px] pointer-events-none"
  ></div>

  <div
    class="w-full max-w-md backdrop-blur-xl bg-white/70 dark:bg-slate-900/70 border border-white/50 dark:border-slate-800 shadow-2xl shadow-indigo-900/10 rounded-3xl p-8 sm:p-10 relative z-10"
  >
    <div class="text-center mb-8">
      <div
        class="inline-flex items-center justify-center bg-gradient-to-tr from-indigo-600 to-rose-500 p-3 rounded-xl shadow-lg shadow-rose-500/20 mb-6"
      >
        <i class="pi pi-envelope text-3xl text-white"></i>
      </div>
      <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">
        Forgot
        <span class="bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-rose-500"
          >Password</span
        >
      </h2>
      <p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">
        Enter your email to receive a password reset link.
      </p>
    </div>

    <form #forgotPasswordForm="ngForm" (ngSubmit)="onSubmit(forgotPasswordForm)" class="space-y-5">
      <div>
        <label
          for="email"
          class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2"
          >Email Address</label
        >
        <input
          id="email"
          name="email"
          type="email"
          pInputText
          required
          email
          [(ngModel)]="model.email"
          #emailModel="ngModel"
          autocomplete="email"
          class="w-full px-4 py-3 bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-400"
          placeholder="you@example.com"
        />
        <p
          *ngIf="submitted && emailModel.invalid"
          class="mt-2 text-sm text-rose-600 dark:text-rose-400"
        >
          Please enter a valid email address.
        </p>
      </div>

      <div
        *ngIf="successMessage"
        class="rounded-xl px-4 py-3 text-sm bg-emerald-50 text-emerald-700 border border-emerald-200"
      >
        {{ successMessage }}
      </div>
      <div
        *ngIf="errorMessage"
        class="rounded-xl px-4 py-3 text-sm bg-rose-50 text-rose-700 border border-rose-200"
      >
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        [disabled]="loading"
        class="w-full py-3.5 px-4 rounded-xl text-sm font-bold text-white bg-gradient-to-r from-indigo-600 to-rose-500 hover:from-indigo-500 hover:to-rose-400 border-none shadow-lg shadow-indigo-500/25 active:scale-[0.98] transition-all disabled:opacity-60 disabled:cursor-not-allowed"
      >
        {{ loading ? 'Sending...' : 'Send Reset Link' }}
      </button>

      <div class="text-center pt-2">
        <a
          routerLink="/login"
          class="text-sm font-semibold text-indigo-600 hover:text-indigo-500 transition-colors"
          >Back to login</a
        >
      </div>
    </form>
  </div>
</div>
